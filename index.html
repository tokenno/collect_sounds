<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sound Hunt</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    #arrow {
      width: 50px;
      height: 50px;
      transform-origin: center center;
      transition: transform 0.2s linear;
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 p-4">
  <div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-2">Sound Hunt</h1>
    <p class="mb-4">Walk around to discover hidden sounds nearby.</p>
    <div id="status" class="text-green-600 mb-4">Waiting for GPS...</div>

    <div class="mb-4">
      <h2 class="font-semibold">Collected Sounds</h2>
      <ul id="collectedList" class="list-disc list-inside">
        <li id="sound0" class="text-red-600">Sound 1: Not found</li>
        <li id="sound1" class="text-red-600">Sound 2: Not found</li>
        <li id="sound2" class="text-red-600">Sound 3: Not found</li>
        <li id="sound3" class="text-red-600">Sound 4: Not found</li>
      </ul>
    </div>

    <div class="mb-4">
      <h2 class="font-semibold mb-2">Select Target</h2>
      <select id="targetSelector" class="w-full p-2 border rounded">
        <option value="0">Target 1</option>
        <option value="1">Target 2</option>
        <option value="2">Target 3</option>
        <option value="3">Target 4</option>
      </select>
    </div>

    <div class="flex justify-center items-center mb-4">
      <img id="arrow" src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Red_Arrow_Up.svg" alt="Direction Arrow" />
    </div>

    <div class="mb-4">
      <h2 class="font-semibold mb-2">Toggle Manual Mode</h2>
      <div id="manualFields" class="space-y-2">
        <div class="flex items-center space-x-2">
          <input id="manualLat0" class="w-1/2 p-1 border" placeholder="Lat 1" readonly />
          <input id="manualLon0" class="w-1/2 p-1 border" placeholder="Lon 1" readonly />
          <button onclick="setManual(0)" class="bg-blue-500 text-white px-2 py-1">Set</button>
        </div>
        <div class="flex items-center space-x-2">
          <input id="manualLat1" class="w-1/2 p-1 border" placeholder="Lat 2" readonly />
          <input id="manualLon1" class="w-1/2 p-1 border" placeholder="Lon 2" readonly />
          <button onclick="setManual(1)" class="bg-blue-500 text-white px-2 py-1">Set</button>
        </div>
        <div class="flex items-center space-x-2">
          <input id="manualLat2" class="w-1/2 p-1 border" placeholder="Lat 3" readonly />
          <input id="manualLon2" class="w-1/2 p-1 border" placeholder="Lon 3" readonly />
          <button onclick="setManual(2)" class="bg-blue-500 text-white px-2 py-1">Set</button>
        </div>
        <div class="flex items-center space-x-2">
          <input id="manualLat3" class="w-1/2 p-1 border" placeholder="Lat 4" readonly />
          <input id="manualLon3" class="w-1/2 p-1 border" placeholder="Lon 4" readonly />
          <button onclick="setManual(3)" class="bg-blue-500 text-white px-2 py-1">Set</button>
        </div>
      </div>
    </div>

    <div class="mb-4">
      <button onclick="toggleMute()" class="bg-red-500 text-white px-4 py-2">Sound Off</button>
    </div>

    <div class="mb-4">
      <h2 class="font-semibold mb-2">Mixer</h2>
      <div class="space-y-2">
        <div>Track 1: <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume(0, this.value)"></div>
        <div>Track 2: <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume(1, this.value)"></div>
        <div>Track 3: <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume(2, this.value)"></div>
        <div>Track 4: <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume(3, this.value)"></div>
      </div>
    </div>
  </div>

  <script>
    const targetLocations = [
      { lat: 63.8257, lon: 20.2630 },
      { lat: 63.8265, lon: 20.2662 },
      { lat: 63.8249, lon: 20.2688 },
      { lat: 63.8234, lon: 20.2640 }
    ];

    const trackURLs = [
      '/sound1.wav',
      '/sound2.wav',
      '/sound3.wav',
      '/sound4.wav'
    ];

    const unlocked = [false, false, false, false];
    let collected = 0;
    let beepInterval = null;
    let audioCtx = null;
    let currentLat = 0;
    let currentLon = 0;
    let sources = [null, null, null, null];
    let gains = [null, null, null, null];
    let muted = false;

    const statusEl = document.getElementById('status');
    const arrowEl = document.getElementById('arrow');
    const targetSelector = document.getElementById('targetSelector');

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const toRad = x => x * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function getBearing(lat1, lon1, lat2, lon2) {
      const toRad = x => x * Math.PI / 180;
      const toDeg = x => x * 180 / Math.PI;
      const dLon = toRad(lon2 - lon1);
      const y = Math.sin(dLon) * Math.cos(toRad(lat2));
      const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
                Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
      return (toDeg(Math.atan2(y, x)) + 360) % 360;
    }

    function updateArrow(bearing) {
      arrowEl.style.transform = `rotate(${bearing}deg)`;
    }

    function startBeeping(distance) {
      const interval = Math.max(300, distance * 10);
      if (beepInterval) clearInterval(beepInterval);
      beepInterval = setInterval(() => {
        if (!muted) {
          const beep = new Audio('/beep.wav');
          beep.play();
        }
      }, interval);
    }

    function stopBeeping() {
      if (beepInterval) {
        clearInterval(beepInterval);
        beepInterval = null;
      }
    }

    async function unlockSound(index) {
      if (unlocked[index]) return;
      unlocked[index] = true;
      stopBeeping();
      alert("You found a sound!");

      if (!audioCtx) audioCtx = new AudioContext();
      const res = await fetch(trackURLs[index]);
      const buf = await res.arrayBuffer();
      const audioBuf = await audioCtx.decodeAudioData(buf);
      const source = audioCtx.createBufferSource();
      const gainNode = audioCtx.createGain();
      source.buffer = audioBuf;
      source.loop = true;
      source.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      gainNode.gain.value = 1;
      source.start();

      sources[index] = source;
      gains[index] = gainNode;

      document.getElementById(`sound${index}`).textContent = `Sound ${index + 1}: Found!`;
      document.getElementById(`sound${index}`).classList.replace("text-red-600", "text-green-600");

      collected++;
      if (collected === 4) {
        setTimeout(() => alert("Well done! All sounds collected."), 500);
      }
    }

    function toggleMute() {
      muted = !muted;
      if (audioCtx && gains) {
        gains.forEach(g => g && (g.gain.value = muted ? 0 : 1));
      }
    }

    function setVolume(index, value) {
      if (gains[index]) gains[index].gain.value = muted ? 0 : parseFloat(value);
    }

    function setManual(index) {
      document.getElementById(`manualLat${index}`).value = currentLat.toFixed(6);
      document.getElementById(`manualLon${index}`).value = currentLon.toFixed(6);
    }

    navigator.geolocation.watchPosition(pos => {
      const { latitude, longitude } = pos.coords;
      currentLat = latitude;
      currentLon = longitude;

      for (let i = 0; i < 4; i++) {
        document.getElementById(`manualLat${i}`).value = latitude.toFixed(6);
        document.getElementById(`manualLon${i}`).value = longitude.toFixed(6);
      }

      const targetIndex = parseInt(targetSelector.value);
      const target = targetLocations[targetIndex];
      const bearing = getBearing(currentLat, currentLon, target.lat, target.lon);
      updateArrow(bearing);

      statusEl.textContent = `Current location: ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;

      let closest = null;
      let closestDist = Infinity;

      for (let i = 0; i < targetLocations.length; i++) {
        if (unlocked[i]) continue;
        const dist = getDistance(latitude, longitude, targetLocations[i].lat, targetLocations[i].lon);
        if (dist < closestDist) {
          closest = i;
          closestDist = dist;
        }
      }

      if (closest !== null) {
        if (closestDist < 10) {
          unlockSound(closest);
          statusEl.textContent = `Sound ${closest + 1} found!`;
        } else if (closestDist < 50) {
          startBeeping(closestDist);
          statusEl.textContent = `You're getting warmer... (${Math.round(closestDist)}m)`;
        } else {
          stopBeeping();
          statusEl.textContent = `Keep walking... (${Math.round(closestDist)}m)`;
        }
      }
    }, err => {
      statusEl.textContent = 'Error getting GPS location.';
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(() => {
          console.log('Service Worker Registered');
        });
      });
    }
  </script>
</body>
</html>
