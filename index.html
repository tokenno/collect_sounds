<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sound Hunt</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    #arrow {
      width: 50px;
      height: 50px;
      transform-origin: center center;
      transition: transform 0.2s linear;
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 p-4">
  <div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-2">Sound Hunt</h1>
    <p class="mb-4">Walk around to discover hidden sounds nearby.</p>
    <div id="status" class="text-green-600 mb-4">Waiting for GPS...</div>

    <div class="mb-4">
      <h2 class="font-semibold">Collected Sounds</h2>
      <ul id="collectedList" class="list-disc list-inside">
        <li id="sound0" class="text-red-600">Sound 1: Not found</li>
        <li id="sound1" class="text-red-600">Sound 2: Not found</li>
        <li id="sound2" class="text-red-600">Sound 3: Not found</li>
        <li id="sound3" class="text-red-600">Sound 4: Not found</li>
      </ul>
    </div>

    <div class="mb-4">
      <h2 class="font-semibold mb-2">Select Target</h2>
      <select id="targetSelector" class="w-full p-2 border rounded">
        <option value="0">Target 1</option>
        <option value="1">Target 2</option>
        <option value="2">Target 3</option>
        <option value="3">Target 4</option>
      </select>
    </div>

    <div class="flex justify-center items-center mb-4">
      <img id="arrow" src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Red_Arrow_Up.svg" alt="Direction Arrow" />
    </div>

    <div class="mb-4">
      <h2 class="font-semibold">Toggle Manual Mode</h2>
      <div id="manualSection">
        <div class="mb-2" id="manual0">Manual 1: <span id="coord0">-</span> <button onclick="setManual(0)" class="bg-blue-500 text-white px-2 py-1 rounded">Set</button></div>
        <div class="mb-2" id="manual1">Manual 2: <span id="coord1">-</span> <button onclick="setManual(1)" class="bg-blue-500 text-white px-2 py-1 rounded">Set</button></div>
        <div class="mb-2" id="manual2">Manual 3: <span id="coord2">-</span> <button onclick="setManual(2)" class="bg-blue-500 text-white px-2 py-1 rounded">Set</button></div>
        <div class="mb-2" id="manual3">Manual 4: <span id="coord3">-</span> <button onclick="setManual(3)" class="bg-blue-500 text-white px-2 py-1 rounded">Set</button></div>
      </div>
    </div>

    <div class="mb-4">
      <h2 class="font-semibold">Mixer</h2>
      <div id="mixer"></div>
    </div>

    <button onclick="soundOff()" class="bg-red-600 text-white px-4 py-2 rounded">Sound Off</button>
  </div>

  <script>
    const targetLocations = [
      { lat: 63.8257, lon: 20.2630 },
      { lat: 63.8265, lon: 20.2662 },
      { lat: 63.8249, lon: 20.2688 },
      { lat: 63.8234, lon: 20.2640 }
    ];

    const trackURLs = [
      '/sound1.wav',
      '/sound2.wav',
      '/sound3.wav',
      '/sound4.wav'
    ];

    const unlocked = [false, false, false, false];
    const activeZones = [false, false, false, false];
    const played = [false, false, false, false];
    const audioSources = [null, null, null, null];
    const gainNodes = [null, null, null, null];
    let collected = 0;
    let beepInterval = null;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let currentLat = 0;
    let currentLon = 0;

    const statusEl = document.getElementById('status');
    const arrowEl = document.getElementById('arrow');
    const targetSelector = document.getElementById('targetSelector');

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const toRad = x => x * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function getBearing(lat1, lon1, lat2, lon2) {
      const toRad = x => x * Math.PI / 180;
      const toDeg = x => x * 180 / Math.PI;
      const dLon = toRad(lon2 - lon1);
      const y = Math.sin(dLon) * Math.cos(toRad(lat2));
      const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
                Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
      return (toDeg(Math.atan2(y, x)) + 360) % 360;
    }

    function updateArrow(bearing) {
      arrowEl.style.transform = `rotate(${bearing}deg)`;
    }

    function startBeeping(distance) {
      const interval = Math.max(300, distance * 10);
      if (beepInterval) clearInterval(beepInterval);
      beepInterval = setInterval(() => {
        const beep = new Audio('/beep.wav');
        beep.play();
      }, interval);
    }

    function stopBeeping() {
      if (beepInterval) {
        clearInterval(beepInterval);
        beepInterval = null;
      }
    }

    async function playSound(index) {
      if (audioSources[index]) return;
      const res = await fetch(trackURLs[index]);
      const buf = await res.arrayBuffer();
      const audioBuf = await audioCtx.decodeAudioData(buf);
      const source = audioCtx.createBufferSource();
      const gain = audioCtx.createGain();
      source.buffer = audioBuf;
      source.connect(gain);
      gain.connect(audioCtx.destination);
      gain.gain.value = 1;
      gainNodes[index] = gain;
      audioSources[index] = source;
      source.loop = true;
      source.start();

      const mixer = document.getElementById('mixer');
      const slider = document.createElement('input');
      slider.type = 'range';
      slider.min = 0;
      slider.max = 1;
      slider.step = 0.01;
      slider.value = 1;
      slider.oninput = () => gain.gain.value = slider.value;
      mixer.appendChild(slider);
    }

    async function unlockSound(index) {
      if (!unlocked[index]) {
        unlocked[index] = true;
        document.getElementById(`sound${index}`).textContent = `Sound ${index + 1}: Found!`;
        document.getElementById(`sound${index}`).classList.replace("text-red-600", "text-green-600");
        collected++;
        if (collected === 4) setTimeout(() => alert("Well done! All sounds collected."), 500);
      }
      stopBeeping();
      await playSound(index);
    }

    function setManual(index) {
      targetLocations[index] = { lat: currentLat, lon: currentLon };
      played[index] = false;
      document.getElementById(`coord${index}`).textContent = `${currentLat.toFixed(5)}, ${currentLon.toFixed(5)}`;
    }

    function soundOff() {
      audioSources.forEach(src => src && src.stop());
      audioSources.fill(null);
      gainNodes.fill(null);
      document.getElementById('mixer').innerHTML = '';
    }

    navigator.geolocation.watchPosition(pos => {
      const { latitude, longitude } = pos.coords;
      currentLat = latitude;
      currentLon = longitude;
      statusEl.textContent = `Current location: ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;

      for (let i = 0; i < 4; i++) {
        document.getElementById(`coord${i}`).textContent = `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
      }

      const targetIndex = parseInt(targetSelector.value);
      const target = targetLocations[targetIndex];
      const bearing = getBearing(currentLat, currentLon, target.lat, target.lon);
      updateArrow(bearing);

      for (let i = 0; i < targetLocations.length; i++) {
        const dist = getDistance(latitude, longitude, targetLocations[i].lat, targetLocations[i].lon);

   if (dist < 10) {
  if (!activeZones[i]) {
    activeZones[i] = true;
    unlockSound(i);
  }
} else {
  if (activeZones[i]) {
    activeZones[i] = false;
    audioSources[i]?.stop(); // optional: stop loop
    audioSources[i] = null;
  }
}

    }, err => {
      statusEl.textContent = 'Error getting GPS location.';
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(() => {
          console.log('Service Worker Registered');
        });
      });
    }
  </script>
</body>
</html>
